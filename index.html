<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#05060a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>a little universe</title>
<style>
  :root{
    --ink:#f4e9df;
    --hint:#c9b8a8;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body{ height:100%; background:#05060a; }
  body{
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
    color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    user-select:none; -webkit-user-select:none;
  }
  body.locked{ overflow:hidden; }

  #stage{ position:fixed; inset:0; z-index:0; }
  #stage canvas{ display:block; width:100%; height:100%; }

  /* tall spacer that gives the page its scroll length */
  #spacer{ height:680vh; }

  /* ---------- floating poem lines ---------- */
  #overlay{ position:fixed; inset:0; z-index:2; pointer-events:none; }
  .line{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%) translateY(14px);
    width:min(86vw, 30ch);
    text-align:center;
    font-style:italic;
    font-size:clamp(1.35rem, 5.6vw, 2.3rem);
    line-height:1.4;
    letter-spacing:0.01em;
    opacity:0;
    text-shadow:0 0 26px rgba(255,190,120,0.22), 0 1px 2px rgba(0,0,0,0.55);
    will-change:opacity, transform;
  }
  .hint{
    position:absolute; left:50%; transform:translateX(-50%);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-weight:600; font-size:0.66rem;
    letter-spacing:0.34em; text-transform:uppercase;
    color:var(--hint); opacity:0; white-space:nowrap;
    will-change:opacity;
  }
  #hintScroll{ bottom:calc(24px + env(safe-area-inset-bottom, 0px)); }
  #hintTouch{ bottom:calc(24px + env(safe-area-inset-bottom, 0px)); }
  #hintTap{ bottom:calc(24px + env(safe-area-inset-bottom, 0px)); }

  #finaleName{
    position:absolute; left:50%; top:64%;
    transform:translate(-50%,-50%) translateY(10px);
    font-style:italic; text-align:center;
    font-size:clamp(1.6rem, 8vw, 3.1rem);
    letter-spacing:0.02em;
    color:#ffd9c9;
    opacity:0;
    text-shadow:0 0 34px rgba(255,150,140,0.4);
    will-change:opacity, transform;
  }
  #finaleCloser{
    position:absolute; left:50%; top:73%;
    transform:translate(-50%,-50%) translateY(8px);
    font-style:italic; text-align:center;
    font-size:clamp(1.05rem, 4.5vw, 1.5rem);
    letter-spacing:0.02em;
    color:var(--ink);
    opacity:0;
    text-shadow:0 0 22px rgba(255,190,150,0.3);
    will-change:opacity, transform;
  }

  /* ---------- start gate ---------- */
  #gate{
    position:fixed; inset:0; z-index:5;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:1.1rem; text-align:center;
    background:radial-gradient(120% 90% at 50% 45%, rgba(5,6,10,0.25), rgba(5,6,10,0.92) 78%);
    cursor:pointer;
    transition:opacity 1.1s ease;
  }
  #gate.hidden{ opacity:0; pointer-events:none; }
  #gate .eyebrow{
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-weight:600; font-size:0.64rem;
    letter-spacing:0.4em; text-transform:uppercase;
    color:var(--hint);
  }
  #gate h1{
    font-weight:400; font-style:italic;
    font-size:clamp(2.1rem, 10vw, 3.6rem);
    letter-spacing:0.01em;
  }
  #gate .begin{
    margin-top:0.6rem;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-weight:600; font-size:0.66rem;
    letter-spacing:0.34em; text-transform:uppercase;
    color:var(--ink);
    padding:0.85rem 1.6rem;
    border:1px solid rgba(244,233,223,0.35);
    border-radius:999px;
    animation:breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{ opacity:0.55; } 50%{ opacity:1; } }

  #fallback{
    position:fixed; inset:0; z-index:6; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:1.4rem; padding:2rem; text-align:center;
    font-style:italic; font-size:1.2rem; line-height:1.6;
  }

  @media (prefers-reduced-motion: reduce){
    #gate .begin{ animation:none; opacity:0.85; }
  }
</style>
</head>
<body class="locked">

<div id="stage"><canvas id="c"></canvas></div>
<div id="spacer"></div>

<div id="overlay"></div>

<div id="gate">
  <div class="eyebrow">a little universe</div>
  <h1 id="gateTitle">for you</h1>
  <div class="begin">tap to begin</div>
</div>

<div id="fallback"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script id="app">
(function(){
'use strict';

/* ================================================================
   EDIT ME — everything personal lives in this block.
   ================================================================ */
var CONFIG = {
  name: "Holly",

  lines: [                                       // one line per chapter — edit freely
    "My life was good before I met you. It really was.",
    "Then you came along and added something I can't live without.",
    "See how everything is drawn to you? I am too.",
    "You make my life better every single day. Wherever you go, I want to go with you."
  ],

  closer: "I love you so much.",
                                                 // (set to "" to remove it)

  finaleWords: ["HAPPY", "BIRTHDAY"],            // built from particles

  palette: "ember"                               // "ember" (gold → rose)
                                                 // or "ethereal" (teal → violet)
};

var PALETTES = {
  ember: {
    bgCold: 0x05060a, bgWarm: 0x150a0e,
    cold:   0x51617f, warm:   0xffc069,
    accA:   0xffb168, accB:   0xff7f9e,
    rose:   0xffd4c2,
    sparks: [0xffc069, 0xff7f9e, 0xfff1d6, 0xffa4b8]
  },
  ethereal: {
    bgCold: 0x04070c, bgWarm: 0x0b0716,
    cold:   0x4a6a7d, warm:   0x6fe3d6,
    accA:   0x5fd6c8, accB:   0xb08cff,
    rose:   0xd7c9ff,
    sparks: [0x6fe3d6, 0xb08cff, 0xe8f6ff, 0x8fb8ff]
  }
};

/* ================================================================
   Setup
   ================================================================ */
var PAL = PALETTES[CONFIG.palette] || PALETTES.ember;
var reduceMotion = window.matchMedia &&
    window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var SPEED = reduceMotion ? 0.45 : 1.0;

var isMobile = (navigator.maxTouchPoints > 0) || window.innerWidth < 820;
var N       = isMobile ? 8500 : 14000;   // total particles
var TEXTMAX = Math.min(7000, Math.floor(N * 0.72));

var fallbackEl = document.getElementById('fallback');
function showFallback(){
  var html = '<div>for ' + escapeHtml(CONFIG.name) + '</div>';
  for (var i = 0; i < CONFIG.lines.length; i++){
    html += '<div>' + escapeHtml(CONFIG.lines[i]) + '</div>';
  }
  html += '<div>happy birthday.</div>';
  if (CONFIG.closer){ html += '<div>' + escapeHtml(CONFIG.closer) + '</div>'; }
  fallbackEl.innerHTML = html;
  fallbackEl.style.display = 'flex';
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(ch){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch];
  });
}

if (!window.THREE){ showFallback(); return; }

var renderer;
try{
  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('c'),
    antialias: false,
    alpha: false,
    powerPreference: 'high-performance'
  });
}catch(e){ showFallback(); return; }

var DPR = Math.min(window.devicePixelRatio || 1, 2);
renderer.setPixelRatio(DPR);

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(60, 1, 0.1, 400);
camera.position.set(0, 0, 60);

var viewW = 10, viewH = 10;
function computeView(){
  var fovR = camera.fov * Math.PI / 180;
  viewH = 2 * Math.tan(fovR / 2) * camera.position.z;
  viewW = viewH * camera.aspect;
}

var bgCold = new THREE.Color(PAL.bgCold);
var bgWarm = new THREE.Color(PAL.bgWarm);
var bgNow  = bgCold.clone();

/* ---------------- soft glow sprite ---------------- */
function makeSprite(){
  var s = 64;
  var cv = document.createElement('canvas');
  cv.width = s; cv.height = s;
  var ctx = cv.getContext('2d');
  var g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0.0, 'rgba(255,255,255,1)');
  g.addColorStop(0.25,'rgba(255,255,255,0.55)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.12)');
  g.addColorStop(1.0, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, s, s);
  var tex = new THREE.CanvasTexture(cv);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}
var sprite = makeSprite();

/* ================================================================
   Main particle cloud
   ================================================================ */
var pos   = new Float32Array(N * 3);
var vel   = new Float32Array(N * 3);
var seed  = new Float32Array(N);
var aVar  = new Float32Array(N);
var aSize = new Float32Array(N);
var aAlp  = new Float32Array(N);
var aStr  = new Float32Array(N);   // 0 or 1 → which of the two currents
var aTxt  = new Float32Array(N);   // 1 → this particle belongs to the letters

for (var i = 0; i < N; i++){
  var i3 = i * 3;
  pos[i3    ] = (Math.random() - 0.5) * 60;
  pos[i3 + 1] = (Math.random() - 0.5) * 90;
  pos[i3 + 2] = (Math.random() - 0.5) * 24;
  vel[i3] = 0; vel[i3+1] = 0; vel[i3+2] = 0;
  seed[i]  = Math.random();
  aVar[i]  = Math.random();
  aSize[i] = 0.8 + Math.pow(Math.random(), 2.2) * 1.9;
  aAlp[i]  = 0;
  aStr[i]  = (i % 2);
}

var geo = new THREE.BufferGeometry();
var posAttr = new THREE.BufferAttribute(pos, 3); posAttr.setUsage(THREE.DynamicDrawUsage);
var alpAttr = new THREE.BufferAttribute(aAlp, 1); alpAttr.setUsage(THREE.DynamicDrawUsage);
geo.setAttribute('position', posAttr);
geo.setAttribute('aAlpha',   alpAttr);
geo.setAttribute('aVar',     new THREE.BufferAttribute(aVar, 1));
geo.setAttribute('aSize',    new THREE.BufferAttribute(aSize, 1));
geo.setAttribute('aStream',  new THREE.BufferAttribute(aStr, 1));
var txtAttr = new THREE.BufferAttribute(aTxt, 1); txtAttr.setUsage(THREE.DynamicDrawUsage);
geo.setAttribute('aText', txtAttr);

var uniforms = {
  uTex:   { value: sprite },
  uPR:    { value: DPR },
  uScale: { value: 300 },
  uWarm:  { value: 0 },
  uRose:  { value: 0 },
  uDuo:   { value: 0 },
  uTextBoost: { value: 0 },
  uGA:    { value: 1 },
  uColdC: { value: new THREE.Color(PAL.cold) },
  uWarmC: { value: new THREE.Color(PAL.warm) },
  uAccA:  { value: new THREE.Color(PAL.accA) },
  uAccB:  { value: new THREE.Color(PAL.accB) },
  uRoseC: { value: new THREE.Color(PAL.rose) }
};

var vertexShader = [
  'attribute float aSize;',
  'attribute float aAlpha;',
  'attribute float aVar;',
  'attribute float aStream;',
  'attribute float aText;',
  'uniform float uPR, uScale, uWarm, uRose, uDuo, uTextBoost;',
  'uniform vec3 uColdC, uWarmC, uAccA, uAccB, uRoseC;',
  'varying float vA;',
  'varying vec3 vC;',
  'void main(){',
  '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
  '  float t = clamp(uWarm + (aVar - 0.5) * 0.35, 0.0, 1.0);',
  '  vec3 c = mix(uColdC, uWarmC, t);',
  '  vec3 duo = mix(uAccA, uAccB, aStream);',
  '  c = mix(c, duo, uDuo * 0.85);',
  '  c = mix(c, uRoseC, uRose * 0.6 * aVar);',
  '  vC = c;',
  '  vA = aAlpha;',
  '  gl_PointSize = clamp(aSize * (1.0 + aText * uTextBoost) * uPR * (uScale / -mv.z), 1.0, 42.0);',
  '  gl_Position = projectionMatrix * mv;',
  '}'
].join('\n');

var fragmentShader = [
  'uniform sampler2D uTex;',
  'uniform float uGA;',
  'varying float vA;',
  'varying vec3 vC;',
  'void main(){',
  '  vec4 s = texture2D(uTex, gl_PointCoord);',
  '  gl_FragColor = vec4(vC, s.a * vA * uGA);',
  '}'
].join('\n');

var mat = new THREE.ShaderMaterial({
  uniforms: uniforms,
  vertexShader: vertexShader,
  fragmentShader: fragmentShader,
  transparent: true,
  depthWrite: false,
  depthTest: false,
  blending: THREE.AdditiveBlending
});

var cloud = new THREE.Points(geo, mat);
scene.add(cloud);

var activeN = N;

/* ================================================================
   Fireworks pool (separate, so the text stays intact)
   ================================================================ */
var FN = isMobile ? 1200 : 1800;
var fpos  = new Float32Array(FN * 3);
var fvel  = new Float32Array(FN * 3);
var flife = new Float32Array(FN);
var fmax  = new Float32Array(FN);
var falp  = new Float32Array(FN);
var fsize = new Float32Array(FN);
var fcol  = new Float32Array(FN * 3);
var fCursor = 0;

for (var f = 0; f < FN; f++){
  fpos[f*3+1] = 9999;   // park offscreen
  fsize[f] = 2.0;
}

var fgeo = new THREE.BufferGeometry();
var fposAttr = new THREE.BufferAttribute(fpos, 3); fposAttr.setUsage(THREE.DynamicDrawUsage);
var falpAttr = new THREE.BufferAttribute(falp, 1); falpAttr.setUsage(THREE.DynamicDrawUsage);
var fcolAttr = new THREE.BufferAttribute(fcol, 3); fcolAttr.setUsage(THREE.DynamicDrawUsage);
fgeo.setAttribute('position', fposAttr);
fgeo.setAttribute('aAlpha',   falpAttr);
fgeo.setAttribute('aCol',     fcolAttr);
fgeo.setAttribute('aSize',    new THREE.BufferAttribute(fsize, 1));

var fmat = new THREE.ShaderMaterial({
  uniforms: { uTex: { value: sprite }, uPR: { value: DPR }, uScale: uniforms.uScale },
  vertexShader: [
    'attribute float aSize;',
    'attribute float aAlpha;',
    'attribute vec3 aCol;',
    'uniform float uPR, uScale;',
    'varying float vA;',
    'varying vec3 vC;',
    'void main(){',
    '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
    '  vC = aCol;',
    '  vA = aAlpha;',
    '  gl_PointSize = clamp(aSize * uPR * (uScale / -mv.z), 1.0, 36.0);',
    '  gl_Position = projectionMatrix * mv;',
    '}'
  ].join('\n'),
  fragmentShader: [
    'uniform sampler2D uTex;',
    'varying float vA;',
    'varying vec3 vC;',
    'void main(){',
    '  vec4 s = texture2D(uTex, gl_PointCoord);',
    '  gl_FragColor = vec4(vC, s.a * vA);',
    '}'
  ].join('\n'),
  transparent: true,
  depthWrite: false,
  depthTest: false,
  blending: THREE.AdditiveBlending
});
scene.add(new THREE.Points(fgeo, fmat));

var sparkColors = [];
for (var sc = 0; sc < PAL.sparks.length; sc++){
  sparkColors.push(new THREE.Color(PAL.sparks[sc]));
}

function spawnBurst(x, y){
  var count = reduceMotion ? 50 : 90 + Math.floor(Math.random() * 40);
  var col = sparkColors[Math.floor(Math.random() * sparkColors.length)];
  var base = viewH * 0.28;
  for (var k = 0; k < count; k++){
    var idx = fCursor; fCursor = (fCursor + 1) % FN;
    var i3 = idx * 3;
    var ang = Math.random() * Math.PI * 2;
    var up  = (Math.random() - 0.35) * Math.PI;
    var spd = base * (0.35 + Math.random() * 0.85);
    fpos[i3] = x; fpos[i3+1] = y; fpos[i3+2] = (Math.random() - 0.5) * 4;
    fvel[i3    ] = Math.cos(ang) * Math.cos(up) * spd;
    fvel[i3 + 1] = Math.sin(up) * spd;
    fvel[i3 + 2] = Math.sin(ang) * Math.cos(up) * spd * 0.4;
    flife[idx] = fmax[idx] = 0.9 + Math.random() * 0.9;
    var shade = 0.75 + Math.random() * 0.25;
    fcol[i3] = col.r * shade; fcol[i3+1] = col.g * shade; fcol[i3+2] = col.b * shade;
  }
}

function updateFireworks(dt){
  var g = viewH * 0.45;
  var drag = Math.exp(-dt * 1.7);
  for (var idx = 0; idx < FN; idx++){
    if (flife[idx] <= 0){ falp[idx] = 0; continue; }
    var i3 = idx * 3;
    flife[idx] -= dt;
    fvel[i3 + 1] -= g * dt;
    fvel[i3] *= drag; fvel[i3+1] *= drag; fvel[i3+2] *= drag;
    fpos[i3    ] += fvel[i3    ] * dt;
    fpos[i3 + 1] += fvel[i3 + 1] * dt;
    fpos[i3 + 2] += fvel[i3 + 2] * dt;
    var lifeT = Math.max(flife[idx] / fmax[idx], 0);
    falp[idx] = Math.pow(lifeT, 1.4) * (0.7 + 0.3 * Math.sin(flife[idx] * 40));
  }
  fposAttr.needsUpdate = true;
  falpAttr.needsUpdate = true;
  fcolAttr.needsUpdate = true;
}

/* ================================================================
   Text → particle targets ("HAPPY / BIRTHDAY" sampled from a canvas)
   ================================================================ */
var textTargets = new Float32Array(TEXTMAX * 2);
var textCount = 0;

function buildTextTargets(){
  var cw = 1024, ch = 1024;
  var cv = document.createElement('canvas');
  cv.width = cw; cv.height = ch;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  var words = CONFIG.finaleWords;
  var fs = 220;
  ctx.font = '900 ' + fs + 'px -apple-system, "Helvetica Neue", Arial, sans-serif';
  var widest = 1;
  for (var w = 0; w < words.length; w++){
    widest = Math.max(widest, ctx.measureText(words[w]).width);
  }
  fs = Math.floor(fs * (cw * 0.9) / widest);
  ctx.font = '900 ' + fs + 'px -apple-system, "Helvetica Neue", Arial, sans-serif';

  var lineGap = fs * 1.14;
  var startY = ch / 2 - lineGap * (words.length - 1) / 2;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = Math.max(2, fs * 0.05);
  for (var w2 = 0; w2 < words.length; w2++){
    ctx.fillText(words[w2], cw / 2, startY + w2 * lineGap);
    ctx.strokeText(words[w2], cw / 2, startY + w2 * lineGap);
  }

  var img = ctx.getImageData(0, 0, cw, ch).data;
  var pts = [];
  var minX = cw, maxX = 0, minY = ch, maxY = 0;
  var step = 2;
  for (var y = 0; y < ch; y += step){
    for (var x = 0; x < cw; x += step){
      if (img[(y * cw + x) * 4 + 3] > 120){
        pts.push(x, y);
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  var total = pts.length / 2;
  if (total < 10) { textCount = 0; return; }

  // world-space box the text should occupy (fit width, cap height)
  var srcW = Math.max(maxX - minX, 1);
  var srcH = Math.max(maxY - minY, 1);
  var worldWText = viewW * 0.92;
  var worldHText = worldWText * (srcH / srcW);
  var capH = viewH * 0.40;
  if (worldHText > capH){
    worldWText *= capH / worldHText;
    worldHText = capH;
  }
  var yCenter = viewH * 0.09;   // sit a little above middle; her name renders below in DOM

  textCount = Math.min(TEXTMAX, total);

  // pick a random subset + shuffle so the text assembles organically
  var order = new Array(total);
  for (var o = 0; o < total; o++) order[o] = o;
  for (var s2 = total - 1; s2 > 0; s2--){
    var j = (Math.random() * (s2 + 1)) | 0;
    var tmp = order[s2]; order[s2] = order[j]; order[j] = tmp;
  }
  for (var p2 = 0; p2 < textCount; p2++){
    var oi = order[p2] * 2;
    var nx = (pts[oi]     - minX) / srcW - 0.5;
    var ny = (pts[oi + 1] - minY) / srcH - 0.5;
    textTargets[p2 * 2    ] = nx * worldWText;
    textTargets[p2 * 2 + 1] = -ny * worldHText + yCenter;
  }

  for (var q = 0; q < N; q++){ aTxt[q] = q < textCount ? 1 : 0; }
  txtAttr.needsUpdate = true;
}

/* ================================================================
   Phase weights driven by scroll
   ================================================================ */
function clamp01(x){ return x < 0 ? 0 : (x > 1 ? 1 : x); }
function sstep(a, b, x){
  var t = clamp01((x - a) / (b - a));
  return t * t * (3 - 2 * t);
}
function windowFn(p, a, b, c, d){
  return sstep(a, b, p) * (1 - sstep(c, d, p));
}

var W = { noise: 1, stream: 0, drawn: 0, duo: 0, text: 0, party: 0 };

function computeWeights(p){
  W.noise  = 1 - sstep(0.10, 0.20, p);
  W.stream = windowFn(p, 0.12, 0.21, 0.33, 0.42);
  W.drawn  = windowFn(p, 0.36, 0.45, 0.54, 0.63);
  W.duo    = windowFn(p, 0.57, 0.66, 0.73, 0.80);
  W.text   = sstep(0.76, 0.86, p);
  W.party  = sstep(0.90, 0.96, p);

  uniforms.uWarm.value = sstep(0.14, 0.72, p);
  uniforms.uRose.value = sstep(0.80, 0.97, p);
  uniforms.uDuo.value  = W.duo;
  uniforms.uTextBoost.value = W.text * 0.45;

  bgNow.copy(bgCold).lerp(bgWarm, sstep(0.2, 0.9, p));
  renderer.setClearColor(bgNow, 1);
}

/* ================================================================
   Pointer / touch → world-space attractor
   ================================================================ */
var attractor = { x: 0, y: 0, tx: 0, ty: 0, lastTouch: -10 };
var ndc = new THREE.Vector3();

function pointToWorld(clientX, clientY){
  ndc.set(
    (clientX / window.innerWidth) * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1,
    0.5
  );
  ndc.unproject(camera);
  var dir = ndc.sub(camera.position);
  var t = -camera.position.z / dir.z;
  return {
    x: camera.position.x + dir.x * t,
    y: camera.position.y + dir.y * t
  };
}

function onMove(e){
  var cx, cy;
  if (e.touches && e.touches.length){ cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
  else { cx = e.clientX; cy = e.clientY; }
  var wp = pointToWorld(cx, cy);
  attractor.tx = wp.x; attractor.ty = wp.y;
  attractor.lastTouch = elapsed;
}
window.addEventListener('pointermove', onMove, { passive: true });
window.addEventListener('touchmove',  onMove, { passive: true });
window.addEventListener('touchstart', onMove, { passive: true });

/* taps during the finale launch fireworks */
var downX = 0, downY = 0;
window.addEventListener('pointerdown', function(e){
  downX = e.clientX; downY = e.clientY;
  var wp = pointToWorld(e.clientX, e.clientY);
  attractor.tx = wp.x; attractor.ty = wp.y;
  attractor.lastTouch = elapsed;
}, { passive: true });
window.addEventListener('pointerup', function(e){
  if (!started || W.party < 0.5) return;
  var dx = e.clientX - downX, dy = e.clientY - downY;
  if (dx * dx + dy * dy > 400) return;  // that was a scroll, not a tap
  var wp = pointToWorld(e.clientX, e.clientY);
  spawnBurst(wp.x, wp.y);
  lastAutoBurst = elapsed;
}, { passive: true });

/* ================================================================
   Overlay text (poem lines, hints, her name)
   ================================================================ */
var overlay = document.getElementById('overlay');
var lineEls = [];
for (var L = 0; L < CONFIG.lines.length; L++){
  var el = document.createElement('div');
  el.className = 'line';
  el.textContent = CONFIG.lines[L];
  overlay.appendChild(el);
  lineEls.push(el);
}
var nameEl = document.createElement('div');
nameEl.id = 'finaleName';
nameEl.textContent = CONFIG.name;
overlay.appendChild(nameEl);

var closerEl = document.createElement('div');
closerEl.id = 'finaleCloser';
closerEl.textContent = CONFIG.closer || '';
overlay.appendChild(closerEl);

function makeHint(id, text){
  var h = document.createElement('div');
  h.className = 'hint'; h.id = id; h.textContent = text;
  overlay.appendChild(h);
  return h;
}
var hintScroll = makeHint('hintScroll', 'scroll slowly');
var hintTouch  = makeHint('hintTouch',  'touch and hold the screen');
var hintTap    = makeHint('hintTap',    'tap the sky');

var LINE_WINDOWS = [
  [0.030, 0.075, 0.125, 0.170],
  [0.200, 0.245, 0.305, 0.355],
  [0.420, 0.465, 0.525, 0.575],
  [0.630, 0.675, 0.715, 0.760]
];

function setFade(el, o, lift){
  o = clamp01(o);
  el.style.opacity = o.toFixed(3);
  if (lift !== undefined){
    el.style.transform =
      'translate(-50%,-50%) translateY(' + ((1 - o) * lift).toFixed(1) + 'px)';
  }
}

function updateOverlay(p){
  for (var li = 0; li < lineEls.length; li++){
    var wdw = LINE_WINDOWS[li];
    setFade(lineEls[li], windowFn(p, wdw[0], wdw[1], wdw[2], wdw[3]), 14);
  }
  setFade(nameEl, sstep(0.93, 0.985, p), 10);
  setFade(closerEl, sstep(0.965, 1.0, p), 8);
  hintTouch.style.opacity  = (windowFn(p, 0.39, 0.43, 0.56, 0.61) * 0.9).toFixed(3);
  hintTap.style.opacity    = (sstep(0.955, 0.99, p) * 0.85).toFixed(3);
  hintScroll.style.opacity = String(scrollHintAlpha * (1 - sstep(0.02, 0.05, p)));
}

/* ================================================================
   Scroll → progress
   ================================================================ */
var spacer = document.getElementById('spacer');
var progress = 0, progressRaw = 0;

function readScroll(){
  var max = Math.max(spacer.offsetHeight - window.innerHeight, 1);
  progressRaw = clamp01((window.scrollY || window.pageYOffset || 0) / max);
}
window.addEventListener('scroll', readScroll, { passive: true });

/* ================================================================
   Simulation
   ================================================================ */
var elapsed = 0;
var lastAutoBurst = 0;

function simulate(dt, t){
  var wN = W.noise * 0.9 + 0.06;   // a whisper of drift always remains
  var wS = W.stream;
  var wA = W.drawn;
  var wD = W.duo;
  var wT = W.text;

  // attractor eases toward the finger; wanders on its own when idle
  var idle = (t - attractor.lastTouch) > 2.5;
  if (idle){
    attractor.tx = Math.sin(t * 0.43) * viewW * 0.14;
    attractor.ty = Math.sin(t * 0.31 + 1.7) * viewH * 0.12;
  }
  var touchBoost = idle ? 1.0 : 1.7;
  var ease = 1 - Math.exp(-dt * (idle ? 4 : 9));
  attractor.x += (attractor.tx - attractor.x) * ease;
  attractor.y += (attractor.ty - attractor.y) * ease;

  // the two orbiting currents
  var duoR = viewW * 0.17;
  var cAx = Math.cos(t * 0.5) * duoR;
  var cAy = Math.sin(t * 0.65) * viewH * 0.11;
  var cBx = -cAx, cBy = -cAy;

  var flowV = viewW * 0.16;
  var bx = viewW * 0.53, by = viewH * 0.53;
  var dampRate = 2.2 + wT * 4.5;
  var damp = Math.exp(-dt * dampRate);
  var maxV = viewH * (wT > 0.5 ? 0.9 : 1.35);
  var wrapOn = wS > 0.5;
  var alphaEase = 1 - Math.exp(-dt * 5);

  for (var i = 0; i < activeN; i++){
    var i3 = i * 3;
    var px = pos[i3], py = pos[i3+1], pz = pos[i3+2];
    var vx = vel[i3], vy = vel[i3+1], vz = vel[i3+2];
    var sd = seed[i];
    var ax = 0, ay = 0, az = 0;

    /* drifting noise (fake curl) */
    if (wN > 0.01){
      ax += wN * Math.sin(py * 0.33 + t * 0.7 + sd * 9.0) * 1.7;
      ay += wN * Math.cos(px * 0.31 - t * 0.55 + sd * 4.0) * 1.7;
      az += wN * Math.sin((px + py) * 0.19 + t * 0.4) * 1.1;
      ax += wN * (0 - px) * 0.05;
      ay += wN * (0 - py) * 0.05;
    }

    /* braided horizontal currents */
    if (wS > 0.01){
      var lane = (sd * 5) | 0;
      var laneOff = (lane - 2) * viewH * 0.145;
      var targetY = Math.sin(px * (3.2 / viewW) + lane * 1.7 + t * 0.6)
                    * viewH * 0.055 + laneOff;
      ax += wS * (flowV - vx) * 2.0;
      ay += wS * (targetY - py) * 2.6;
      az += wS * (0 - pz) * 1.2;
      if (wrapOn && px > viewW * 0.56){ px -= viewW * 1.12; }
    }

    /* drawn to the light (touch attractor with swirl) */
    if (wA > 0.01){
      var dx = attractor.x - px, dy = attractor.y - py;
      var d = Math.sqrt(dx * dx + dy * dy) + 0.001;
      var ux = dx / d, uy = dy / d;
      var swirl = sd > 0.5 ? 1 : -1;
      var pull = Math.min(d, viewH * 0.5) * 0.55 * touchBoost;
      ax += wA * (ux * pull + -uy * swirl * 2.6 * touchBoost);
      ay += wA * (uy * pull +  ux * swirl * 2.6 * touchBoost);
      az += wA * (0 - pz) * 0.8;
      ax += wA * Math.sin(t * 2.1 + sd * 17.0) * 0.5;
      ay += wA * Math.cos(t * 1.8 + sd * 23.0) * 0.5;
    }

    /* two currents in one orbit */
    if (wD > 0.01){
      var cx2 = aStr[i] ? cAx : cBx;
      var cy2 = aStr[i] ? cAy : cBy;
      var ang = t * (0.9 + sd * 0.7) + sd * 6.283;
      var rad = (0.25 + sd * 0.75) * viewH * 0.20;
      var tx2 = cx2 + Math.cos(ang) * rad;
      var ty2 = cy2 + Math.sin(ang) * rad * 0.6;
      ax += wD * (tx2 - px) * 2.3;
      ay += wD * (ty2 - py) * 2.3;
      az += wD * (Math.sin(ang * 2) * 3 - pz) * 1.4;
    }

    /* becoming the words */
    if (wT > 0.01){
      if (i < textCount){
        var gx = textTargets[i * 2], gy = textTargets[i * 2 + 1];
        ax += wT * (gx - px) * 14.0;
        ay += wT * (gy - py) * 14.0;
        az += wT * (0 - pz) * 10.0;
        if (W.party > 0.1){
          ax += W.party * Math.sin(t * 3.0 + sd * 40.0) * 0.18;
          ay += W.party * Math.cos(t * 2.6 + sd * 31.0) * 0.18;
        }
      } else {
        /* the rest becomes a dim halo behind the words */
        ax += wT * Math.sin(py * 0.2 + t * 0.3 + sd * 7.0) * 0.5;
        ay += wT * Math.cos(px * 0.2 - t * 0.25 + sd * 5.0) * 0.5;
        az += wT * (-16 - pz) * 1.5;
      }
    }

    /* soft walls */
    if (!wrapOn){
      if (px >  bx) ax -= (px - bx) * 2.2;
      if (px < -bx) ax += (-bx - px) * 2.2;
    }
    if (py >  by) ay -= (py - by) * 2.2;
    if (py < -by) ay += (-by - py) * 2.2;
    if (pz >  14) az -= (pz - 14) * 2.0;
    if (pz < -20) az += (-20 - pz) * 2.0;

    vx = (vx + ax * dt * SPEED * 60 * 0.016) * damp;
    vy = (vy + ay * dt * SPEED * 60 * 0.016) * damp;
    vz = (vz + az * dt * SPEED * 60 * 0.016) * damp;

    var sp = Math.sqrt(vx * vx + vy * vy + vz * vz);
    if (sp > maxV){
      var sc2 = maxV / sp;
      vx *= sc2; vy *= sc2; vz *= sc2;
    }

    px += vx * dt; py += vy * dt; pz += vz * dt;

    pos[i3] = px; pos[i3+1] = py; pos[i3+2] = pz;
    vel[i3] = vx; vel[i3+1] = vy; vel[i3+2] = vz;

    /* alpha: fade halo back during the text, everyone in by default */
    var aTarget = (wT > 0.3)
      ? (i < textCount ? (0.9 + 0.1 * aVar[i]) : 0.10)
      : (0.5 + 0.5 * aVar[i]);
    aAlp[i] += (aTarget - aAlp[i]) * alphaEase;
  }

  posAttr.needsUpdate = true;
  alpAttr.needsUpdate = true;
}

/* ================================================================
   Frame loop
   ================================================================ */
var started = false;
var scrollHintAlpha = 0;
var lastTime = 0;
var fpsEMA = 60;
var fpsCheckAt = 4;
var running = true;

function frame(now){
  if (!running) return;
  requestAnimationFrame(frame);
  now *= 0.001;
  var dt = Math.min(now - lastTime, 0.033);
  if (dt <= 0) dt = 0.016;
  lastTime = now;
  elapsed += dt;

  /* adaptive quality: quietly shed particles if the phone is struggling */
  fpsEMA += ((1 / dt) - fpsEMA) * 0.04;
  if (elapsed > fpsCheckAt){
    fpsCheckAt = elapsed + 3;
    var floor = Math.min(activeN, textCount + 900);
    if (fpsEMA < 44 && activeN > floor){
      activeN = Math.max(floor, Math.floor(activeN * 0.82));
      geo.setDrawRange(0, activeN);
    }
  }

  readScroll();
  progress += (progressRaw - progress) * (1 - Math.exp(-dt * 5));
  computeWeights(progress);
  updateOverlay(progress);

  if (started && scrollHintAlpha < 0.85){
    scrollHintAlpha = Math.min(scrollHintAlpha + dt * 0.5, 0.85);
  }

  /* auto fireworks once she reaches the sky */
  if (W.party > 0.6 && elapsed - lastAutoBurst > 2.6){
    lastAutoBurst = elapsed;
    spawnBurst(
      (Math.random() - 0.5) * viewW * 0.6,
      viewH * (0.05 + Math.random() * 0.3)
    );
  }

  simulate(dt, elapsed);
  updateFireworks(dt);

  /* the gentlest camera sway */
  if (!reduceMotion){
    camera.position.x = Math.sin(elapsed * 0.10) * 0.8;
    camera.position.y = Math.cos(elapsed * 0.13) * 0.5;
    camera.lookAt(0, 0, 0);
  }

  renderer.render(scene, camera);
}

document.addEventListener('visibilitychange', function(){
  if (document.hidden){ running = false; }
  else if (!running){ running = true; lastTime = performance.now() * 0.001; requestAnimationFrame(frame); }
});

/* ================================================================
   Resize
   ================================================================ */
var resizeTimer = null;
function resize(){
  var w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  computeView();
  uniforms.uScale.value = (h * 0.5) / Math.tan((camera.fov * Math.PI / 180) / 2) * 0.14;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildTextTargets, 250);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

/* ================================================================
   Start gate
   ================================================================ */
var gate = document.getElementById('gate');
document.getElementById('gateTitle').textContent = 'for ' + CONFIG.name;
document.title = 'for ' + CONFIG.name;

function begin(){
  if (started) return;
  started = true;
  gate.classList.add('hidden');
  document.body.classList.remove('locked');
  window.scrollTo(0, 0);
}
gate.addEventListener('pointerup', begin);
gate.addEventListener('click', begin);

/* ================================================================
   Go
   ================================================================ */
renderer.setClearColor(bgCold, 1);
resize();
buildTextTargets();
readScroll();
lastTime = performance.now() * 0.001;
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
